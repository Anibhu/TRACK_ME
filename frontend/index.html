
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Location Tracker</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<!-- ================= AUTH SECTION ================= -->
<div id="authSection" class="auth-wrapper">
  <div class="auth-card">

    <div class="brand">
      <div class="brand-icon">
        <i class="fas fa-map-marker-alt" style="color:white;"></i>
      </div>
      <h2>NexusTracker</h2>
      <p>Secure real-time location intelligence</p>
    </div>

    <!-- EMAIL -->
    <div class="input-group">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="Email address">
    </div>

    <!-- PASSWORD -->
    <div class="input-group">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <!-- 🔥 COLLEGE SELECT -->
    <div class="input-group">
      <i class="fas fa-university"></i>
      <select id="college">
        <option value="">Select College</option>
        <option value="JGEC">JGEC</option>
        <option value="CGEC">CGEC</option>
      </select>
    </div>

    <!-- BUTTONS -->
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="login()">
        <i class="fas fa-arrow-right-to-bracket"></i> Login
      </button>

      <button class="btn btn-secondary" onclick="signup()">
        <i class="fas fa-user-plus"></i> Signup
      </button>
    </div>

    <div id="authResult" class="auth-message">
      Welcome back, authenticate to continue
    </div>

  </div>
</div>


<!-- ================= APP SECTION ================= -->
<div class="container" id="app" style="display:none;">
<div class="container">

<h1>📍 Location Tracker</h1>

<button onclick="logout()" style="background:#ef4444;color:white;padding:10px;border:none;border-radius:8px;">
Logout
</button>

<h3 id="collegeName"></h3>

<!-- USER -->
<div class="user-section">
<label>User ID:</label>
<input type="text" id="userId" value="user101">
<button onclick="updateUserId()">Update</button>
</div>

<!-- STATUS -->
<div class="status">
<p id="status">Ready to track location...</p>
<p id="currentLocation">No location data yet</p>
</div>

<!-- CONTROLS -->
<div class="controls">
<button onclick="startTracking()" id="startBtn">Start Tracking</button>
<button onclick="triggerEmergency()" id="emergencyBtn">EMERGENCY</button>
<button onclick="stopEmergency()" id="stopEmergencyBtn" disabled>Stop Emergency</button>
<button onclick="stopTracking()" id="stopBtn" disabled>Stop Tracking</button>
</div>

<!-- NAV -->
<div class="navigation">
<a href="view_path.html">View User Paths →</a>
</div>

<!-- MAP -->
<div class="map-container">
<div id="map"></div>
</div>

</div>
</div>


<!-- ================= SCRIPTS ================= -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="js/map.js"></script>
<script src="js/tracking.js"></script>

<script>

// ================= CONFIG =================
const INACTIVITY_LIMIT = 5 * 60 * 1000;
let idleTimer;


// ================= LOAD =================
window.onload = () => {
    const session = localStorage.getItem("supabase_session");
    const college = localStorage.getItem("college");

    if (session && college) {
        showApp();
        resetIdleTimer();
    }
};


// ================= SIGNUP =================
async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const college = document.getElementById("college").value;

    if (!email || !password || !college) {
        alert("Fill all fields");
        return;
    }

    const res = await fetch("https://track-me-backend-rzto.onrender.com/api/v1/auth/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password, college })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("supabase_session", JSON.stringify(data.session));
        localStorage.setItem("user_id", data.user.id);
        localStorage.setItem("college", data.college);

        showApp();
    } else {
        alert(data.detail);
    }
}


// ================= LOGIN =================
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const college = document.getElementById("college").value;

    if (!college) {
        alert("Select college");
        return;
    }

    const res = await fetch("https://track-me-backend-rzto.onrender.com/api/v1/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password, college })
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("supabase_session", JSON.stringify(data.session));
        localStorage.setItem("user_id", data.user.id);
        localStorage.setItem("college", data.college);

        showApp();
    } else {
        alert(data.detail);
    }
}


// ================= LOGOUT =================
function logout() {
    localStorage.clear();
    location.reload();
}


// ================= SHOW APP =================
function showApp() {
    const college = localStorage.getItem("college");

    if (!college) {
        logout();
        return;
    }

    document.getElementById("authSection").style.display = "none";
    document.getElementById("app").style.display = "block";

    document.getElementById("collegeName").innerText = "College: " + college;

    if (!window.trackingMap) {
        window.trackingMap = new MapManager('map');
    } else {
        window.trackingMap.map.invalidateSize();
    }

    const savedId = localStorage.getItem("user_id");
    if(savedId) document.getElementById("userId").value = savedId;
}


// ================= INACTIVITY =================
function resetIdleTimer() {
    clearTimeout(idleTimer);

    idleTimer = setTimeout(() => {
        alert("Logged out due to inactivity");
        logout();
    }, INACTIVITY_LIMIT);
}

window.onclick = resetIdleTimer;
window.onmousemove = resetIdleTimer;
window.onkeydown = resetIdleTimer;

</script>

</body>
</html>
