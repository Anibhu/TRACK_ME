<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Location Tracker</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
  /* ===============================
     COLLEGE SELECTOR STYLES
  ================================ */
  .college-selector-wrapper {
    margin: 1rem 0;
    padding: 1rem 1.2rem;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 1px solid #334155;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .college-selector-wrapper label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #94a3b8;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .college-btn-group {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .college-btn {
    padding: 0.45rem 1.1rem;
    border-radius: 8px;
    border: 2px solid #334155;
    background: #1e293b;
    color: #94a3b8;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.03em;
  }

  .college-btn:hover {
    border-color: #60a5fa;
    color: #60a5fa;
    background: #1e3a5f;
  }

  .college-btn.active {
    background: #2563eb;
    border-color: #3b82f6;
    color: #ffffff;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
  }

  .college-btn.active:hover {
    background: #1d4ed8;
  }

  /* Hidden native select - used as the actual value store */
  #collegeSelect {
    display: none;
  }

  .college-badge {
    margin-left: auto;
    font-size: 0.75rem;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .college-badge span {
    color: #3b82f6;
    font-weight: 700;
  }
</style>

</head>

<body>
<div id="authSection" class="nt-wrap">
  <div class="nt-grid"></div>
  <div class="nt-pulse"></div>
  <div class="nt-pulse2"></div>

  <div class="nt-card">
    <div class="nt-scan-line"></div>
    <div class="nt-corner tl"></div>
    <div class="nt-corner tr"></div>
    <div class="nt-corner bl"></div>
    <div class="nt-corner br"></div>

    <div class="nt-brand">
      <div class="nt-icon-ring">
        <i class="fas fa-map-marker-alt" style="color:#00c878; font-size:1.1rem;"></i>
      </div>
      <h2>JGEC Tracker</h2>
      <p>Secure real-time location intelligence</p>
    </div>

    <div class="nt-tabs">
      <button class="nt-tab active" onclick="setAuthMode('login',this)">Login</button>
      <button class="nt-tab" onclick="setAuthMode('signup',this)">Sign Up</button>
    </div>

    <div class="nt-field">
      <span class="nt-field-icon"><i class="fas fa-envelope"></i></span>
      <input type="email" id="email" placeholder="Email address" autocomplete="email">
    </div>
    <div class="nt-field">
      <span class="nt-field-icon"><i class="fas fa-lock"></i></span>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="nt-submit" id="authSubmitBtn" onclick="handleAuthSubmit()">
      <i class="fas fa-arrow-right" style="font-size:0.85rem;"></i>
      <span id="authSubmitLabel">Login</span>
    </button>

    <div id="authResult" class="nt-msg">
      <i class="fas fa-shield-alt" style="color:rgba(0,200,120,0.5); font-size:0.75rem;"></i>
      Welcome back, authenticate to continue
    </div>
    <div class="nt-demo">demo: any email &amp; password (mock API)</div>
  </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="container">

    <h1>📍 Location Tracker</h1>
    <button class="btn btn-danger" onclick="logout()" style="background-color: #ef4444; color: white; padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer;">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>

    <div class="user-section">

      <label for="userId">
        <i class="fa fa-user"></i> User ID:
      </label>

      <input type="text" id="userId" placeholder="Enter your user ID" value="user101">

      <button onclick="updateUserId()">
        <i class="fa fa-sync"></i> Update User
      </button>

    </div>

    <!-- ===============================
         COLLEGE SELECTOR
    ================================ -->
    <div class="college-selector-wrapper">
      <label>
        <i class="fas fa-university"></i> Select Campus:
      </label>

      <!-- Hidden select holds the actual value read by tracking.js -->
      <select id="collegeSelect">
        <option value="JGEC">JGEC</option>
        <option value="CGEC">CGEC</option>
      </select>

      <!-- Visual toggle buttons -->
      <div class="college-btn-group">
        <button
          class="college-btn active"
          id="btn-JGEC"
          onclick="selectCollege('JGEC')"
          title="Jalpaiguri Government Engineering College">
          🏛️ JGEC
        </button>
        <button
          class="college-btn"
          id="btn-CGEC"
          onclick="selectCollege('CGEC')"
          title="Cooch Behar Government Engineering College">
          🏛️ CGEC
        </button>
      </div>

      <div class="college-badge">
        <i class="fas fa-location-dot"></i> Geofence: <span id="activeCampusLabel">JGEC</span>
      </div>
    </div>

    <div class="status">

      <p id="status">
        <i class="fa fa-info-circle"></i> Ready to track location...
      </p>

      <p id="currentLocation">
        <i class="fa fa-map-marker-alt"></i> No location data yet
      </p>

    </div>

    <!-- ===============================
         CONTROLS SECTION
    ================================ -->
    <div class="controls">

        <button onclick="startTracking()" id="startBtn">
            <i class="fa fa-play"></i> Start Tracking
        </button>

        <button onclick="triggerEmergency()" id="emergencyBtn" class="btn-emergency">
            <i class="fa fa-exclamation-triangle"></i> EMERGENCY
        </button>

        <button onclick="stopEmergency()" id="stopEmergencyBtn" disabled style="background-color:#6b7280;">
            <i class="fa fa-ban"></i> Stop Emergency
        </button>

        <button onclick="stopTracking()" id="stopBtn" disabled>
            <i class="fa fa-stop"></i> Stop Tracking
        </button>

    </div>

    <div class="navigation">

      <a href="view_path.html" class="nav-link">
        <i class="fa fa-route"></i> View User Paths →
      </a>

    </div>

    <div class="map-container">

      <div id="map"></div>

      <button class="fullscreen-btn" onclick="toggleFullscreenMap()">
        ⛶
      </button>

    </div>

    </div>
</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="js/map.js"></script>
<script src="js/tracking.js"></script>
<script>
// ===============================
// COLLEGE SELECTOR LOGIC
// ===============================
function selectCollege(college) {
    // Update hidden select value
    document.getElementById('collegeSelect').value = college;

    // Update button styles
    document.querySelectorAll('.college-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn-' + college).classList.add('active');

    // Update badge label
    document.getElementById('activeCampusLabel').textContent = college;

    // Instantly update the geofence on the map
    if (window.trackingMap) {
        window.trackingMap.setGeofence(college);
    }
}

// --- CONFIGURATION ---
const INACTIVITY_LIMIT = 5 * 60 * 1000; // 5 minutes
let idleTimer;

// --- 1. SESSION CHECK ON LOAD ---
window.onload = () => {
    const session = localStorage.getItem("supabase_session");
    if (session) {
        showApp();
        resetIdleTimer();
    }
};

// --- 2. SIGNUP FUNCTION ---
async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Please enter both email and password");
        return;
    }

    try {
        const res = await fetch("https://track-me-backend-rzto.onrender.com/api/v1/auth/signup", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.status === "success") {
            localStorage.setItem("supabase_session", JSON.stringify(data.session));
            localStorage.setItem("user_id", data.user.id);

            alert("Account created successfully!");
            showApp();
            resetIdleTimer();
        } else {
            alert("Signup failed: " + (data.detail || "User might already exist"));
        }
    } catch (error) {
        document.getElementById("authResult").innerText = "Error: " + error.message;
    }
}

// --- 3. LOGIN FUNCTION ---
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("https://track-me-backend-rzto.onrender.com/api/v1/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.status === "success") {
            localStorage.setItem("supabase_session", JSON.stringify(data.session));
            localStorage.setItem("user_id", data.user.id);

            showApp();
            resetIdleTimer();
        } else {
            alert("Login failed: " + data.detail);
        }
    } catch (error) {
        document.getElementById("authResult").innerText = "Error: " + error.message;
    }
}

function logout() {
    localStorage.removeItem("supabase_session");
    localStorage.removeItem("user_id");
    location.reload();
}

// --- 4. UI TOGGLE ---
function showApp() {
    document.getElementById("authSection").style.display = "none";
    document.getElementById("app").style.display = "block";
    if (!window.trackingMap) {
        window.trackingMap = new MapManager('map');
    } else {
        window.trackingMap.map.invalidateSize();
    }
    const savedId = localStorage.getItem("user_id");
    if (savedId) {
        document.getElementById("userId").value = savedId;
        if (typeof currentUser !== 'undefined') currentUser = savedId;
    }
}

// --- 5. INACTIVITY LOGIC ---
function resetIdleTimer() {
    if (!localStorage.getItem("supabase_session")) return;

    clearTimeout(idleTimer);

    idleTimer = setTimeout(() => {
        alert("You have been logged out due to 5 minutes of inactivity.");
        logout();
    }, INACTIVITY_LIMIT);
}

window.onmousemove = resetIdleTimer;
window.onmousedown = resetIdleTimer;
window.ontouchstart = resetIdleTimer;
window.onclick = resetIdleTimer;
window.onkeydown = resetIdleTimer;

let currentAuthMode = 'login';
function setAuthMode(mode, btn) {
  currentAuthMode = mode;
  document.querySelectorAll('.nt-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('authSubmitLabel').textContent = mode === 'login' ? 'Login' : 'Create Account';
}
function handleAuthSubmit() {
  currentAuthMode === 'login' ? login() : signup();
}
</script>
</body>
</html>
