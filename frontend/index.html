```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TRACK-ME | Smart Location Tracker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --gold:#c9a84c;
    --gold-light:#f5d77c;
    --bg:#050816;
    --card:#0f172a;
    --text:#f1f5f9;
    --muted:#94a3b8;
    --blue:#3b82f6;
    --green:#3ecf8e;
    --red:#ef4444;
}

body{
    font-family:'Raleway',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

/* =========================
   BACKGROUND
========================= */

.bg-scene{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.bg-grid{
    position:absolute;
    inset:0;

    background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

    background-size:60px 60px;
}

.orb{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:float 10s infinite alternate;
}

.orb1{
    width:500px;
    height:500px;
    background:rgba(201,168,76,0.12);
    top:-150px;
    left:-100px;
}

.orb2{
    width:400px;
    height:400px;
    background:rgba(59,130,246,0.10);
    bottom:-100px;
    right:-100px;
}

@keyframes float{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(40px);
    }
}

/* =========================
   AUTH PAGE
========================= */

.auth-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.auth-card{
    width:100%;
    max-width:420px;

    background:rgba(15,23,42,0.82);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:28px;

    backdrop-filter:blur(18px);

    padding:40px;

    box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.03);
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo h1{
    font-family:'Cinzel',serif;
    color:var(--gold);
    font-size:2.3rem;
    letter-spacing:0.18em;
}

.logo p{
    margin-top:10px;
    color:var(--muted);
    letter-spacing:0.08em;
}

/* =========================
   INPUTS
========================= */

.field{
    position:relative;
    margin-bottom:20px;
}

.field input{
    width:100%;
    padding:16px 18px 16px 50px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,255,255,0.06);

    border-radius:14px;

    color:white;

    outline:none;

    transition:0.3s;
}

.field input:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 4px rgba(201,168,76,0.10);
}

.field i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:var(--gold);
}

/* =========================
   BUTTONS
========================= */

.btn{
    width:100%;
    padding:16px;

    border:none;
    border-radius:14px;

    font-weight:700;
    cursor:pointer;

    transition:0.3s;

    font-size:0.95rem;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-login{
    background:linear-gradient(135deg,var(--gold),#9c7b1f);
    color:black;
}

.btn-signup{
    background:transparent;
    border:1px solid rgba(255,255,255,0.08);
    color:white;
    margin-top:14px;
}

/* =========================
   APP
========================= */

.dashboard{
    padding:30px;
}

.dashboard-container{
    max-width:1400px;
    margin:auto;

    background:rgba(15,23,42,0.78);

    border-radius:30px;

    padding:30px;

    border:1px solid rgba(255,255,255,0.05);

    backdrop-filter:blur(18px);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.5);
}

/* =========================
   HEADER
========================= */

.dashboard-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;

    margin-bottom:30px;
}

.dashboard-header h1{
    font-family:'Cinzel',serif;
    color:var(--gold);
    font-size:2.5rem;
    letter-spacing:0.15em;
}

.dashboard-header p{
    color:var(--muted);
    margin-top:8px;
}

.status-badge{
    display:flex;
    align-items:center;
    gap:10px;

    padding:14px 20px;

    background:rgba(62,207,142,0.08);

    border:1px solid rgba(62,207,142,0.2);

    border-radius:16px;

    color:var(--green);

    font-weight:700;
}

.pulse{
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--green);

    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(2.5);
        opacity:0;
    }
}

/* =========================
   GRID
========================= */

.grid{
    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

    gap:22px;

    margin-bottom:30px;
}

.card{
    background:rgba(15,23,42,0.9);

    border:1px solid rgba(255,255,255,0.05);

    border-radius:24px;

    padding:24px;

    transition:0.3s;
}

.card:hover{
    transform:translateY(-4px);

    border-color:rgba(201,168,76,0.3);

    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.card h3{
    margin-bottom:18px;
    color:var(--gold);
}

/* =========================
   CONTROLS
========================= */

.controls{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
}

.controls button{
    flex:1;
    min-width:180px;

    padding:15px;

    border:none;

    border-radius:14px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;
}

.controls button:hover{
    transform:translateY(-2px);
}

.start-btn{
    background:linear-gradient(135deg,#22c55e,#15803d);
    color:white;
}

.stop-btn{
    background:#475569;
    color:white;
}

.emergency-btn{
    background:linear-gradient(135deg,#ef4444,#991b1b);

    color:white;

    animation:emergencyGlow 2s infinite alternate;
}

@keyframes emergencyGlow{
    from{
        box-shadow:0 0 15px rgba(239,68,68,0.4);
    }

    to{
        box-shadow:0 0 35px rgba(239,68,68,0.9);
    }
}

/* =========================
   MAP
========================= */

.map-container{
    position:relative;

    overflow:hidden;

    border-radius:28px;

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
        0 20px 60px rgba(0,0,0,0.5);
}

#map{
    width:100%;
    height:650px;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    .dashboard{
        padding:15px;
    }

    .dashboard-header{
        flex-direction:column;
        align-items:flex-start;
    }

    .dashboard-header h1{
        font-size:1.8rem;
    }

    .controls{
        flex-direction:column;
    }

    #map{
        height:450px;
    }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-scene">
    <div class="bg-grid"></div>

    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
</div>

<!-- AUTH -->
<div class="auth-page" id="authSection">

    <div class="auth-card">

        <div class="logo">
            <h1>TRACK-ME</h1>
            <p>Smart Geofence Tracking Platform</p>
        </div>

        <div class="field">
            <i class="fas fa-envelope"></i>
            <input type="email" placeholder="Email Address">
        </div>

        <div class="field">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <button class="btn btn-login">
            <i class="fas fa-right-to-bracket"></i>
            Login
        </button>

        <button class="btn btn-signup">
            <i class="fas fa-user-plus"></i>
            Signup
        </button>

    </div>

</div>

<!-- DASHBOARD -->
<div class="dashboard" id="app">

<div class="dashboard-container">

    <!-- HEADER -->
    <div class="dashboard-header">

        <div>
            <h1>TRACK-ME</h1>
            <p>Real-Time Emergency & Geofence Monitoring System</p>
        </div>

        <div class="status-badge">
            <span class="pulse"></span>
            SYSTEM ACTIVE
        </div>

    </div>

    <!-- GRID -->
    <div class="grid">

        <!-- USER -->
        <div class="card">
            <h3><i class="fas fa-user"></i> User</h3>

            <div class="field">
                <i class="fas fa-id-card"></i>
                <input type="text" value="user101">
            </div>

            <button class="btn btn-login">
                Update User
            </button>
        </div>

        <!-- CONTACT -->
        <div class="card">

            <h3><i class="fas fa-shield-halved"></i> Emergency Contacts</h3>

            <p>📱 +91 9876543210</p>
            <br>
            <p>🛡️ +91 9123456780</p>

        </div>

        <!-- CAMPUS -->
        <div class="card">

            <h3><i class="fas fa-university"></i> Campus</h3>

            <div class="controls">

                <button class="btn-login btn">
                    JGEC
                </button>

                <button class="btn-signup btn">
                    CGEC
                </button>

            </div>

        </div>

    </div>

    <!-- CONTROLS -->
    <div class="card">

        <h3><i class="fas fa-satellite-dish"></i> Tracking Controls</h3>

        <div class="controls">

            <button class="start-btn">
                ▶ Start Tracking
            </button>

            <button class="emergency-btn">
                🚨 EMERGENCY
            </button>

            <button class="stop-btn">
                ⛔ Stop
            </button>

        </div>

    </div>

    <br>

    <!-- MAP -->
    <div class="map-container">
        <div id="map"></div>
    </div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([26.5215, 88.7195], 15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap contributors'
}).addTo(map);

L.marker([26.5215,88.7195])
.addTo(map)
.bindPopup("Current Location")
.openPopup();

</script>

</body>
</html>
