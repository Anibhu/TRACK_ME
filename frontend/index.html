<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Location Tracker</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="container">

<h1>📍 Location Tracker</h1>

<div class="user-section">

<label for="userId">
<i class="fa fa-user"></i> User ID:
</label>

<input type="text" id="userId" placeholder="Enter your user ID" value="user101">

<button onclick="updateUserId()">
<i class="fa fa-sync"></i> Update User
</button>

</div>


<div class="status">

<p id="status">
<i class="fa fa-info-circle"></i> Ready to track location...
</p>

<p id="currentLocation">
<i class="fa fa-map-marker-alt"></i> No location data yet
</p>

</div>


<!-- ===============================
     CONTROLS SECTION
================================ -->
<div class="controls">

    <button onclick="startTracking()" id="startBtn">
        <i class="fa fa-play"></i> Start Tracking
    </button>
    
    <button onclick="triggerEmergency()" id="emergencyBtn" class="btn-emergency">
        <i class="fa fa-exclamation-triangle"></i> EMERGENCY
    </button>

    <!-- 🔥 NEW STOP EMERGENCY BUTTON -->
    <button onclick="stopEmergency()" id="stopEmergencyBtn" disabled style="background-color:#6b7280;">
        <i class="fa fa-ban"></i> Stop Emergency
    </button>

    <button onclick="stopTracking()" id="stopBtn" disabled>
        <i class="fa fa-stop"></i> Stop Tracking
    </button>

</div>


<div class="navigation">

<a href="view_path.html" class="nav-link">
<i class="fa fa-route"></i> View User Paths →
</a>

</div>


<div class="map-container">

<div id="map"></div>

<button class="fullscreen-btn" onclick="toggleFullscreenMap()">
⛶
</button>

</div>

</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="js/map.js"></script>
<script src="js/tracking.js"></script>

</body>
</html>
